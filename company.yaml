# company.yaml — your channel, encoded
#
# Fill every section below. The OS reads this on boot to determine which skills can run.
# Each section maps 1:1 to a compartment in ENCODING.md.
# Completeness scoring runs over this file.
#
# Conventions:
# - String values: leave blank ("") if unknown. The OS will flag the gap.
# - Lists: leave [] if unknown. The OS will flag the gap.
# - Integers: leave 0 if unknown. The OS will flag the gap.
# - Booleans: leave false if unknown.
#
# Never check this file into a public remote. Never share verbatim.

# ─────────────────────────────────────────────────────────────────────────────
# COMPARTMENT 1 — Creator Identity Matrix (15%)
# ─────────────────────────────────────────────────────────────────────────────

creator_identity_matrix:
