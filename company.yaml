    sub_niche: ""
    business_model: ""                 # coaching / consulting / info-product / mastermind / agency / hybrid
    revenue_tier: ""                   # pre-revenue | $5K-$25K/mo | $25K-$100K/mo | $100K-$500K/mo | $500K+/mo
    years_creating: 0
    total_subscribers: 0
    long_form_avg_views: 0
    short_form_avg_views: 0
    upload_cadence_long: ""            # weekly / biweekly / monthly / irregular
    upload_cadence_short: ""           # daily / weekly / never

  brand_voice_architecture:
    communication_style: ""            # direct / consultative / storytelling / analytical / contrarian
    tone_framework:
      primary: ""
      secondary: ""
    personality_traits: []
    language_patterns: []
    phrases_to_use: []                 # verbatim creator phrases
    phrases_to_avoid: []
    persuasion_style: ""               # authority-by-proof / story-first / mechanism-first / contrarian-provocation
    authority_positioning: ""          # category-king / challenger / insider / outsider-with-edge

  on_camera_persona:
    delivery_style: ""                 # high-energy / measured / contrarian / warm-instructional / confessional
    posture_default: ""                # standing / sitting / hybrid
    framing_default: ""                # medium-close / waist-up / talking-head
    pace_baseline_wpm: 0
    pause_rhythm: ""                   # rare / measured / frequent
    eye_line_default: ""               # camera-direct / off-camera-occasionally
    energy_arc: ""                     # flat / rising / wave / front-loaded
